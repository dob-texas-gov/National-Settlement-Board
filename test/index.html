<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Portal | Texas Department of Banking</title>
    
    <!-- Authentic Institutional Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind Configuration for Official Gov Colors
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        govBlue: { 
                            light: '#005ea2', // Official US Gov Blue
                            dark: '#1a4480' 
                        },
                        govRed: '#b91c1c', // Texas State Red
                        darkBase: '#0b1117' // Deep Institutional Dark
                    },
                    fontFamily: {
                        sans: ['"Public Sans"', 'sans-serif'],
                        mono: ['"Roboto Mono"', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style>
        /* Smooth transition for theme switching */
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        
        /* Specialized "Official" Glow for dark mode text */
        .dark .text-glow { text-shadow: 0 0 8px rgba(255,255,255,0.2); }
    </style>
</head>

<body class="bg-slate-50 dark:bg-darkBase text-slate-900 dark:text-slate-100 min-h-screen">

    <!-- THEME SWITCHER FLOATING BUTTON -->
    <div class="fixed bottom-5 right-5 z-50">
        <button onclick="toggleTheme()" class="p-3 rounded-full bg-govBlue-light text-white shadow-xl hover:scale-110 transition-transform">
            <span id="theme-icon">🌙</span>
        </button>
    </div>

    <!-- MAIN WRAPPER -->
    <div id="app-container">
        <!-- Next steps will insert the Header, Content, and Footer here -->
        <div class="p-20 text-center">
            <h1 class="text-4xl font-black uppercase tracking-tighter mb-4">Institutional Framework Loaded</h1>
            <p class="font-mono text-sm opacity-60">Status: CSS_ENGINE_ACTIVE | Mode: <span id="mode-text">Light</span></p>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            const modeText = document.getElementById('mode-text');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.innerText = '🌙';
                modeText.innerText = 'Light';
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.innerText = '☀️';
                modeText.innerText = 'Dark';
            }
        }

        // Apply saved theme on page load
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').innerText = '☀️';
            document.getElementById('mode-text').innerText = 'Dark';
        }
    </script>
</body>
</html>
