
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consolidated Screening List | CFTF Administrative Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Public Sans', sans-serif; }
        .dept-header { background-color: #002E6D; border-bottom: 4px solid #FFBE2E; }
        .gov-banner { background: #f0f0f0; border-bottom: 1px solid #d6d6d6; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-[#F1F3F5]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                Shield: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
                Search: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
                Alert: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
                Link: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
                File: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
                Lock: <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            };
            return icons[name] || null;
        };

        const generateEntities = () => {
            const geos = ["Hong Kong", "Singapore", "UAE", "Seychelles", "BVI", "Cayman Islands", "Cyprus", "Panama"];
            const states = ["Banned", "Nominated", "Review"];
            return Array.from({ length: 350 }, (_, i) => ({
                name: `${["APEX", "SINO", "GLOBAL", "PACIFIC", "NORDIC"][i%5]} ${["SETTLEMENT", "CLEARANCE", "TRADE", "CAPITAL", "FIDUCIARY"][i%5]} ${["GROUP", "LTD", "LLC", "INTERNATIONAL"][i%4]}`,
                id: `ENT-${30000 + i}-${String.fromCharCode(65 + (i % 26))}`,
                geo: geos[i % geos.length],
                status: states[i % 3],
                date: `2026-04-${(i % 28) + 1}`
            }));
        };

        const ENTITY_DB = generateEntities();

        function App() {
            const [searchTerm, setSearchTerm] = useState('');
            const [statusFilter, setStatusFilter] = useState('All');
            const [verifyId, setVerifyId] = useState('');
            const [result, setResult] = useState(null);

            const filtered = useMemo(() => {
                return ENTITY_DB.filter(e => 
                    (e.name.toLowerCase().includes(searchTerm.toLowerCase()) || e.id.includes(searchTerm.toUpperCase())) &&
                    (statusFilter === 'All' || e.status === statusFilter)
                );
            }, [searchTerm, statusFilter]);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Official Gov Header */}
                    <div className="gov-banner py-1 px-6 no-print">
                        <div className="max-w-7xl mx-auto flex items-center text-[10px] font-bold text-slate-600 uppercase tracking-widest">
                            <img src="https://flagcdn.com/w20/us.png" className="h-3 mr-2" alt="USA" />
                            An official website of the United States government
                            <a href="https://www.usa.gov" className="ml-4 text-blue-800 underline">Official Guide</a>
                        </div>
                    </div>

                    <header className="dept-header text-white py-6 no-print">
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="bg-white p-1 rounded shadow-sm">
                                    <Icon name="Shield" size={40} className="text-[#002E6D]" />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black uppercase tracking-tighter leading-none">Cyber Fraud Task Force</h1>
                                    <p className="text-[10px] font-bold tracking-[0.3em] text-blue-200 mt-1 uppercase">USSS WFO • Financial Crimes Division</p>
                                </div>
                            </div>
                            <nav className="hidden lg:flex gap-8 text-[11px] font-black uppercase tracking-widest">
                                <a href="https://www.federalregister.gov" className="hover:text-amber-400">Federal Register</a>
                                <a href="https://home.treasury.gov/policy-issues/financial-sanctions/sanctions-programs-and-country-information" className="hover:text-amber-400">OFAC Programs</a>
                                <a href="https://www.fincen.gov/resources/advisories" className="hover:text-amber-400">FinCEN Advisories</a>
                                <a href="#" className="text-amber-400 border-b border-amber-400">CSL Database</a>
                            </nav>
                        </div>
                    </header>

                    {/* News Alert Ticker (Simulation) */}
                    <div className="bg-slate-800 text-white py-2 overflow-hidden no-print">
                        <div className="max-w-7xl mx-auto px-6 flex gap-6 items-center">
                            <span className="bg-red-600 px-2 py-0.5 text-[9px] font-black uppercase">Live Updates</span>
                            <div className="text-[11px] font-medium opacity-80 flex gap-8 whitespace-nowrap overflow-hidden">
                                <span>REUTERS: Treasury expands restricted list for April 2026 review cycle...</span>
                                <span>AP: CFTF clarifies litigation hold protocols for offshore node transfers...</span>
                                <span>BLOOMBERG: Financial institutions brace for new compliance audit mandates...</span>
                            </div>
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-6 py-12 flex-1 w-full">
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-10">
                            
                            {/* Left Sidebar: Official Links & Verification */}
                            <aside className="space-y-8 no-print">
                                <div className="bg-white border border-slate-200 p-6 rounded shadow-sm">
                                    <h3 className="text-[11px] font-black uppercase text-slate-500 mb-4 tracking-widest flex items-center">
                                        <Icon name="Lock" className="mr-2" /> Verify Identifier
                                    </h3>
                                    <input 
                                        type="text" 
                                        placeholder="EX: ENT-30001-A"
                                        className="w-full p-3 text-xs border border-slate-300 rounded mb-3 outline-none focus:ring-1 focus:ring-blue-800 font-mono"
                                        value={verifyId}
                                        onChange={(e) => setVerifyId(e.target.value)}
                                    />
                                    <button 
                                        onClick={() => setResult(ENTITY_DB.find(x => x.id === verifyId.toUpperCase()) || "NF")}
                                        className="w-full bg-[#002E6D] text-white py-3 text-[10px] font-black rounded hover:bg-blue-900 transition-all shadow-md"
                                    >
                                        QUERY SECURE DATABASE
                                    </button>
                                    {result && (
                                        <div className={`mt-4 p-3 text-[10px] font-bold border rounded ${result === "NF" ? 'bg-emerald-50 text-emerald-800 border-emerald-200' : 'bg-red-50 text-red-800 border-red-200'}`}>
                                            {result === "NF" ? "NO MATCH: Identifier is not restricted." : `MATCH FOUND: ${result.name} is ${result.status.toUpperCase()}.`}
                                        </div>
                                    )}
                                </div>

                                <div className="bg-slate-50 border border-slate-200 p-6 rounded">
                                    <h3 className="text-[11px] font-black uppercase text-slate-900 mb-4 tracking-widest">Official References</h3>
                                    <ul className="text-[11px] space-y-3 font-bold text-blue-800">
                                        <li><a href="https://www.state.gov/sanctions-announcements/" className="flex items-center gap-2 hover:underline"><Icon name="Link" size={12}/> State Dept. Announcements</a></li>
                                        <li><a href="https://www.bis.doc.gov/index.php/policy-guidance/lists-of-parties-of-concern/entity-list" className="flex items-center gap-2 hover:underline"><Icon name="Link" size={12}/> BIS Entity List</a></li>
                                        <li><a href="https://www.sec.gov/enforce" className="flex items-center gap-2 hover:underline"><Icon name="Link" size={12}/> SEC Enforcement Actions</a></li>
                                        <li><a href="https://www.justice.gov/news" className="flex items-center gap-2 hover:underline"><Icon name="Link" size={12}/> DOJ Press Room</a></li>
                                    </ul>
                                </div>

                                <div className="bg-amber-50 border-l-4 border-amber-500 p-4">
                                    <p className="text-[10px] font-bold text-amber-900 leading-relaxed uppercase">
                                        Public Notice: Per Executive Order 13873, transactions with banned entities are unauthorized.
                                    </p>
                                </div>
                            </aside>

                            {/* Main List Display */}
                            <div className="lg:col-span-3">
                                <div className="bg-white border border-slate-200 rounded shadow-sm overflow-hidden">
                                    <div className="p-6 border-b border-slate-100 flex flex-wrap gap-4 items-center bg-slate-50/50">
                                        <div className="relative flex-1">
                                            <Icon name="Search" className="absolute left-3 top-3 text-slate-400" />
                                            <input 
                                                type="text" 
                                                placeholder="Search registry by name or ID..."
                                                className="w-full pl-10 p-2.5 text-xs border border-slate-300 rounded outline-none"
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                            />
                                        </div>
                                        <select 
                                            className="text-xs border border-slate-300 p-2.5 rounded font-bold outline-none"
                                            value={statusFilter}
                                            onChange={(e) => setStatusFilter(e.target.value)}
                                        >
                                            <option value="All">All Statuses</option>
                                            <option value="Banned">Banned</option>
                                            <option value="Nominated">Nominated</option>
                                            <option value="Review">Review</option>
                                        </select>
                                    </div>

                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-[12px] border-collapse">
                                            <thead>
                                                <tr className="bg-slate-100/50 text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-200">
                                                    <th className="p-4">Business Legal Entity</th>
                                                    <th className="p-4">Registry ID</th>
                                                    <th className="p-4">Jurisdiction</th>
                                                    <th className="p-4">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {filtered.slice(0, 20).map((e, i) => (
                                                    <tr key={i} className="hover:bg-blue-50/50 transition-colors">
                                                        <td className="p-4 font-bold text-slate-900">{e.name}</td>
                                                        <td className="p-4 font-mono text-slate-500">{e.id}</td>
                                                        <td className="p-4 font-medium text-slate-600">{e.geo}</td>
                                                        <td className="p-4">
                                                            <span className={`px-2 py-1 rounded-sm text-[9px] font-black uppercase border ${
                                                                e.status === 'Banned' ? 'bg-red-100 text-red-800 border-red-200' :
                                                                e.status === 'Nominated' ? 'bg-amber-100 text-amber-800 border-amber-200' :
                                                                'bg-blue-100 text-blue-800 border-blue-200'
                                                            }`}>
                                                                {e.status}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="p-4 bg-slate-50 border-t border-slate-200 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">
                                        Viewing {Math.min(20, filtered.length)} of {filtered.length} Indexed Results
                                    </div>
                                </div>
                                
                                <div className="mt-8 flex items-center justify-between text-[11px] font-bold text-slate-500 opacity-60 no-print">
                                    <span>Dataset Updated: April 16, 2026 20:00 UTC</span>
                                    <div className="flex gap-4">
                                        <a href="https://www.reuters.com" className="hover:underline">Reuters</a>
                                        <a href="https://www.ap.org" className="hover:underline">Associated Press</a>
                                        <a href="https://www.bloomberg.com" className="hover:underline">Bloomberg</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Federal Footer */}
                    <footer className="bg-[#001D44] text-white py-16 no-print">
                        <div className="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-4 gap-12">
                            <div className="space-y-4">
                                <div className="flex items-center gap-2">
                                    <Icon name="Shield" size={24} className="text-blue-300" />
                                    <span className="font-black text-lg">CFTF</span>
                                </div>
                                <p className="text-[10px] opacity-60 leading-relaxed font-bold uppercase tracking-widest">
                                    An official component of the United States Secret Service Washington Field Office.
                                </p>
                            </div>
                            
                            <div>
                                <h4 className="text-[11px] font-black text-blue-300 uppercase mb-6 tracking-widest">Agency Links</h4>
                                <ul className="text-[11px] space-y-3 opacity-70 font-bold uppercase">
                                    <li><a href="https://www.secretservice.gov" className="hover:underline">Secret Service Home</a></li>
                                    <li><a href="https://www.dhs.gov" className="hover:underline">DHS.gov</a></li>
                                    <li><a href="https://www.whitehouse.gov" className="hover:underline">WhiteHouse.gov</a></li>
                                    <li><a href="https://www.regulations.gov" className="hover:underline">Regulations.gov</a></li>
                                </ul>
                            </div>

                            <div>
                                <h4 className="text-[11px] font-black text-blue-300 uppercase mb-6 tracking-widest">Regulatory Sources</h4>
                                <ul className="text-[11px] space-y-3 opacity-70 font-bold uppercase">
                                    <li><a href="https://www.federalreserve.gov" className="hover:underline">Federal Reserve</a></li>
                                    <li><a href="https://www.occ.gov" className="hover:underline">OCC.gov</a></li>
                                    <li><a href="https://www.fdic.gov" className="hover:underline">FDIC.gov</a></li>
                                    <li><a href="https://www.archives.gov" className="hover:underline">National Archives</a></li>
                                </ul>
                            </div>

                            <div className="bg-white/5 p-6 border border-white/10 rounded">
                                <h4 className="text-[10px] font-black text-amber-400 uppercase mb-3 flex items-center">
                                    <Icon name="Lock" size={14} className="mr-2" /> Authorized Use Only
                                </h4>
                                <p className="text-[9px] opacity-50 leading-normal font-medium">
                                    The information provided is for administrative verification. Unauthorized redistribution of this data may violate the Privacy Act of 1974. All access is logged for security auditing.
                                </p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
